<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Simulation</title>
    <link rel="stylesheet" href="downloadProgress.css">
</head>
<body>

    <div class="container">
        <div class="card">

            <div class="icon">
                ⬇
            </div>

            <h2>Downloading File</h2>
            <p class="file-name">project.zip</p>

            <div class="progress-container">
                <div class="progress"></div>
            </div>

            <div class="info">
                <span class="percentage">0%</span>
                <span class="speed">0 MB/s</span>
            </div>

            <button class="download-btn">
                Start Download
            </button>

            <p class="status"></p>

        </div>
    </div>
<script src="downloadProgress.js"></script>
</body>
</html>
