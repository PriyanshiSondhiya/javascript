<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email & Password Validator</title>
    <link rel="stylesheet" href="emailPasswordValidator.css">
</head>
<body>

    <div class="validator-container">
        <h2>Create Account</h2>
        <p class="subtitle">Please enter a valid email and strong password.</p>
        
        <form id="validatorForm" novalidate>
            <div class="input-group" id="emailGroup">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="e.g., alex@example.com" autocomplete="off">
                <i class="status-icon"></i>
                <small class="error-message">Please enter a valid email address.</small>
            </div>

            <div class="input-group" id="passwordGroup">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="At least 8 characters">
                <i class="status-icon"></i>
                <small class="error-message">Password must be at least 8 characters long.</small>
            </div>

            <div class="password-requirements">
                <p>Password must contain:</p>
                <ul>
                    <li id="reqLength" class="invalid">At least 8 characters</li>
                    <li id="reqNumber" class="invalid">At least one number</li>
                    <li id="reqSpecial" class="invalid">At least one special character</li>
                </ul>
            </div>

            <button type="submit" id="submitBtn">Sign Up</button>
        </form>

        <div id="resultMessage">
          There are errors.
        </div>
    </div>

    <script src="emailPasswordValidator.js"></script>
</body>
</html>
